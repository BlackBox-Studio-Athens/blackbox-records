name: Catalog promotion

on:
  workflow_dispatch:
    inputs:
      artifact_commit_sha:
        description: Commit containing generated Desired Catalog State artifacts.
        required: true
        type: string
      target:
        description: Product Environment target sequence.
        required: true
        default: all
        type: choice
        options:
          - all
          - uat
          - prd
      reset_uat_catalog:
        description: Archive active repo-owned UAT Stripe catalog objects and clear current D1 catalog pointers before applying.
        required: false
        default: false
        type: boolean

permissions:
  actions: write
  contents: read
  deployments: write

concurrency:
  group: 'catalog-promotion-${{ inputs.target }}'
  cancel-in-progress: true

jobs:
  verify-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout artifact commit
        uses: actions/checkout@v5.0.1
        with:
          ref: ${{ inputs.artifact_commit_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.34.5

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run repository gates
        run: |
          pnpm test:unit
          pnpm check
          pnpm build

  promote-uat:
    if: ${{ inputs.target == 'all' || inputs.target == 'uat' }}
    needs: verify-artifact
    runs-on: ubuntu-latest
    environment: catalog-promotion-uat
    env:
      CATALOG_MUTATION_SCOPE: ${{ inputs.reset_uat_catalog && format('{0}-{1}', github.run_id, github.run_attempt) || github.run_id }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      STRIPE_PAYMENT_METHOD_CONFIGURATION_ID: ${{ vars.STRIPE_PAYMENT_METHOD_CONFIGURATION_ID }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
    steps:
      - name: Checkout artifact commit
        uses: actions/checkout@v5.0.1
        with:
          ref: ${{ inputs.artifact_commit_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.34.5

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify UAT webhook and payment configuration
        run: |
          pnpm runtime:config:verify --env uat
          pnpm stripe:webhooks:verify --env uat
          pnpm stripe:payment-methods:verify

      - name: Prepare UAT D1 catalog readiness
        run: |
          pnpm --filter @blackbox/backend d1:migrations:apply:uat
          pnpm --filter @blackbox/backend d1:seed:uat:catalog

      - name: Reset UAT provider catalog and D1 pointers
        if: ${{ inputs.reset_uat_catalog }}
        run: |
          set -o pipefail
          mkdir -p .codex-artifacts/catalog-promotion/uat
          pnpm stripe:catalog:reset-uat --env uat --confirm 2>&1 | tee .codex-artifacts/catalog-promotion/uat/catalog-reset.txt
          pnpm --filter @blackbox/backend exec wrangler d1 execute COMMERCE_DB \
            --env uat \
            --remote \
            --command "DELETE FROM StoreOfferSnapshot WHERE variantId IN (SELECT variantId FROM StoreItemOption); DELETE FROM VariantStripeMapping WHERE variantId IN (SELECT variantId FROM StoreItemOption);" \
            --json

      - name: Plan UAT provider catalog
        run: |
          set -o pipefail
          mkdir -p .codex-artifacts/catalog-promotion/uat
          pnpm stripe:catalog:verify --env uat --plan-apply --promotion-run-id "$CATALOG_MUTATION_SCOPE" 2>&1 | tee .codex-artifacts/catalog-promotion/uat/catalog-plan.txt

      - name: Apply UAT provider catalog
        run: |
          set -o pipefail
          pnpm stripe:catalog:verify --env uat --apply --promotion-run-id "$CATALOG_MUTATION_SCOPE"
          pnpm stripe:catalog:verify --env uat --promotion-run-id "$CATALOG_MUTATION_SCOPE" 2>&1 | tee .codex-artifacts/catalog-promotion/uat/catalog-post-apply.txt

      - name: Deploy UAT Worker
        run: pnpm deploy:backend:uat

      - name: Verify hosted UAT listing readiness
        run: pnpm store:listing-readiness:verify -- --env uat --url "${{ vars.UAT_PUBLIC_BACKEND_BASE_URL }}/api/store/listing-prices"

      - name: Dispatch UAT static deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main -f artifact_commit_sha=${{ inputs.artifact_commit_sha }} -f target=uat

      - name: Upload UAT Promotion Evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v5.0.0
        with:
          name: catalog-promotion-uat-${{ github.run_id }}
          path: |
            .codex-artifacts/catalog-promotion/uat/**
          if-no-files-found: warn

  promote-prd:
    if: ${{ always() && needs.verify-artifact.result == 'success' && (inputs.target == 'prd' || (inputs.target == 'all' && needs.promote-uat.result == 'success')) }}
    needs:
      - verify-artifact
      - promote-uat
    runs-on: ubuntu-latest
    environment: catalog-promotion-prd
    env:
      CATALOG_MUTATION_SCOPE: ${{ github.run_id }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      PRD_OPEN_GATE: ${{ vars.PRD_OPEN_GATE }}
      STRIPE_PAYMENT_METHOD_CONFIGURATION_ID: ${{ vars.STRIPE_PAYMENT_METHOD_CONFIGURATION_ID }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
    steps:
      - name: Checkout artifact commit
        uses: actions/checkout@v5.0.1
        with:
          ref: ${{ inputs.artifact_commit_sha }}

      - name: Confirm PRD open gate
        run: |
          mkdir -p .codex-artifacts/catalog-promotion/prd
          if [ "${PRD_OPEN_GATE}" = "open" ]; then
            echo "PRD_LIVE_MUTATION_ENABLED=true" >> "$GITHUB_ENV"
            echo "PRD open gate present; live provider mutation may continue." > .codex-artifacts/catalog-promotion/prd/prd-open-gate.txt
          else
            echo "PRD_LIVE_MUTATION_ENABLED=false" >> "$GITHUB_ENV"
            {
              echo "status=not_configured"
              echo "reason=PRD checkout and live provider mutation are disabled until PRD_OPEN_GATE is set to open in the catalog-promotion-prd credential scope."
              echo "artifact_commit_sha=${{ inputs.artifact_commit_sha }}"
              echo "run_id=${{ github.run_id }}"
            } > .codex-artifacts/catalog-promotion/prd/prd-not-configured.txt
          fi

      - name: Setup pnpm
        if: env.PRD_LIVE_MUTATION_ENABLED == 'true'
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.34.5

      - name: Setup Node.js
        if: env.PRD_LIVE_MUTATION_ENABLED == 'true'
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        if: env.PRD_LIVE_MUTATION_ENABLED == 'true'
        run: pnpm install --frozen-lockfile

      - name: Verify PRD webhook and payment configuration
        if: env.PRD_LIVE_MUTATION_ENABLED == 'true'
        run: |
          pnpm runtime:config:verify --env prd --require-live-secrets
          pnpm stripe:webhooks:verify --env prd
          pnpm stripe:payment-methods:verify

      - name: Prepare PRD D1 catalog readiness
        if: env.PRD_LIVE_MUTATION_ENABLED == 'true'
        run: |
          pnpm --filter @blackbox/backend d1:migrations:apply:prd
          pnpm prd:catalog-readiness:check -- --phase pre-apply
          pnpm --filter @blackbox/backend d1:seed:prd:catalog-readiness
          pnpm prd:catalog-readiness:check -- --phase pre-apply

      - name: Plan PRD provider catalog
        if: env.PRD_LIVE_MUTATION_ENABLED == 'true'
        run: |
          set -o pipefail
          mkdir -p .codex-artifacts/catalog-promotion/prd
          pnpm stripe:catalog:verify --env prd --plan-apply --promotion-run-id "$CATALOG_MUTATION_SCOPE" 2>&1 | tee .codex-artifacts/catalog-promotion/prd/catalog-plan.txt

      - name: Apply PRD provider catalog
        if: env.PRD_LIVE_MUTATION_ENABLED == 'true'
        run: |
          set -o pipefail
          pnpm stripe:catalog:verify --env prd --apply --ci-promotion --artifact-commit-sha "${{ inputs.artifact_commit_sha }}" --promotion-run-id "$CATALOG_MUTATION_SCOPE"
          pnpm stripe:catalog:verify --env prd --promotion-run-id "$CATALOG_MUTATION_SCOPE" 2>&1 | tee .codex-artifacts/catalog-promotion/prd/catalog-post-apply.txt
          pnpm prd:catalog-readiness:check -- --phase post-apply

      - name: Deploy PRD Worker
        if: env.PRD_LIVE_MUTATION_ENABLED == 'true'
        run: pnpm deploy:backend:prd

      - name: Verify hosted PRD listing readiness
        if: env.PRD_LIVE_MUTATION_ENABLED == 'true'
        run: pnpm store:listing-readiness:verify -- --env prd --url "${{ vars.PRD_PUBLIC_BACKEND_BASE_URL }}/api/store/listing-prices"

      - name: Dispatch PRD static deployment
        if: env.PRD_LIVE_MUTATION_ENABLED == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main -f artifact_commit_sha=${{ inputs.artifact_commit_sha }} -f target=prd

      - name: Upload PRD readiness or Promotion Evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v5.0.0
        with:
          name: catalog-promotion-prd-${{ github.run_id }}
          path: |
            .codex-artifacts/catalog-promotion/prd/**
          if-no-files-found: warn
