name: Catalog promotion

on:
  workflow_dispatch:
    inputs:
      artifact_commit_sha:
        description: Commit containing generated Desired Catalog State artifacts.
        required: true
        type: string
      target:
        description: Product Environment target sequence.
        required: true
        default: all
        type: choice
        options:
          - all
          - uat
          - prd

permissions:
  contents: read
  deployments: write

concurrency:
  group: 'catalog-promotion-${{ inputs.target }}'
  cancel-in-progress: true

jobs:
  verify-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout artifact commit
        uses: actions/checkout@v5.0.1
        with:
          ref: ${{ inputs.artifact_commit_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.33.4

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run repository gates
        run: |
          pnpm test:unit
          pnpm check
          pnpm build

  promote-uat:
    if: ${{ inputs.target == 'all' || inputs.target == 'uat' }}
    needs: verify-artifact
    runs-on: ubuntu-latest
    environment: catalog-promotion-uat
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      STRIPE_PAYMENT_METHOD_CONFIGURATION_ID: ${{ vars.STRIPE_PAYMENT_METHOD_CONFIGURATION_ID }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
    steps:
      - name: Checkout artifact commit
        uses: actions/checkout@v5.0.1
        with:
          ref: ${{ inputs.artifact_commit_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.33.4

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify UAT webhook and payment configuration
        run: |
          pnpm runtime:config:verify --env sandbox
          pnpm stripe:webhooks:verify --env sandbox
          pnpm stripe:payment-methods:verify

      - name: Prepare UAT D1 catalog readiness
        run: |
          pnpm --filter @blackbox/backend d1:migrations:apply:sandbox
          pnpm --filter @blackbox/backend d1:seed:sandbox:uat-catalog

      - name: Plan UAT provider catalog
        run: |
          mkdir -p .codex-artifacts/catalog-promotion/uat
          pnpm stripe:catalog:verify --env sandbox 2>&1 | tee .codex-artifacts/catalog-promotion/uat/catalog-plan.txt

      - name: Apply UAT provider catalog
        run: |
          pnpm stripe:catalog:verify --env sandbox --apply
          pnpm stripe:catalog:verify --env sandbox 2>&1 | tee .codex-artifacts/catalog-promotion/uat/catalog-post-apply.txt

      - name: Deploy UAT Worker
        run: pnpm deploy:backend:sandbox

      - name: Upload UAT Promotion Evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: catalog-promotion-uat-${{ github.run_id }}
          path: |
            .codex-artifacts/catalog-promotion/uat/**
          if-no-files-found: warn

  promote-prd:
    if: ${{ always() && needs.verify-artifact.result == 'success' && (inputs.target == 'prd' || (inputs.target == 'all' && needs.promote-uat.result == 'success')) }}
    needs:
      - verify-artifact
      - promote-uat
    runs-on: ubuntu-latest
    environment: catalog-promotion-prd
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      PRD_OPEN_GATE: ${{ vars.PRD_OPEN_GATE }}
      STRIPE_PAYMENT_METHOD_CONFIGURATION_ID: ${{ vars.STRIPE_PAYMENT_METHOD_CONFIGURATION_ID }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
    steps:
      - name: Checkout artifact commit
        uses: actions/checkout@v5.0.1
        with:
          ref: ${{ inputs.artifact_commit_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.33.4

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Confirm PRD open gate
        run: |
          mkdir -p .codex-artifacts/catalog-promotion/prd
          if [ "${PRD_OPEN_GATE}" = "open" ]; then
            echo "PRD_LIVE_MUTATION_ENABLED=true" >> "$GITHUB_ENV"
            echo "PRD open gate present; live provider mutation may continue." > .codex-artifacts/catalog-promotion/prd/prd-open-gate.txt
          else
            echo "PRD_LIVE_MUTATION_ENABLED=false" >> "$GITHUB_ENV"
            {
              echo "status=not_configured"
              echo "reason=PRD checkout and live provider mutation are disabled until PRD_OPEN_GATE is set to open in the catalog-promotion-prd credential scope."
              echo "artifact_commit_sha=${{ inputs.artifact_commit_sha }}"
              echo "run_id=${{ github.run_id }}"
            } > .codex-artifacts/catalog-promotion/prd/prd-not-configured.txt
          fi

      - name: Verify production webhook and payment configuration
        if: env.PRD_LIVE_MUTATION_ENABLED == 'true'
        run: |
          pnpm runtime:config:verify --env production --require-live-secrets
          pnpm stripe:webhooks:verify --env production
          pnpm stripe:payment-methods:verify

      - name: Prepare production D1 catalog readiness
        if: env.PRD_LIVE_MUTATION_ENABLED == 'true'
        run: |
          pnpm --filter @blackbox/backend d1:migrations:apply:production
          pnpm production:catalog-readiness:check -- --phase pre-apply
          pnpm --filter @blackbox/backend d1:seed:production:catalog-readiness
          pnpm production:catalog-readiness:check -- --phase pre-apply

      - name: Plan production provider catalog
        if: env.PRD_LIVE_MUTATION_ENABLED == 'true'
        run: |
          mkdir -p .codex-artifacts/catalog-promotion/prd
          pnpm stripe:catalog:verify --env production 2>&1 | tee .codex-artifacts/catalog-promotion/prd/catalog-plan.txt

      - name: Apply production provider catalog
        if: env.PRD_LIVE_MUTATION_ENABLED == 'true'
        run: |
          pnpm stripe:catalog:verify --env production --apply --ci-promotion --artifact-commit-sha "${{ inputs.artifact_commit_sha }}" --promotion-run-id "${{ github.run_id }}"
          pnpm stripe:catalog:verify --env production 2>&1 | tee .codex-artifacts/catalog-promotion/prd/catalog-post-apply.txt
          pnpm production:catalog-readiness:check -- --phase post-apply

      - name: Deploy production Worker
        if: env.PRD_LIVE_MUTATION_ENABLED == 'true'
        run: pnpm deploy:backend:production

      - name: Confirm static frontend artifact commit
        if: env.PRD_LIVE_MUTATION_ENABLED == 'true'
        run: test "$(git rev-parse HEAD)" = "${{ inputs.artifact_commit_sha }}"

      - name: Upload PRD readiness or Promotion Evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: catalog-promotion-prd-${{ github.run_id }}
          path: |
            .codex-artifacts/catalog-promotion/prd/**
          if-no-files-found: warn
