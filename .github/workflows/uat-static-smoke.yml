name: UAT static smoke

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: Deployed UAT static site URL.
        required: true
        default: https://blackbox-studio-athens.github.io/blackbox-records
        type: string
      scenario:
        description: Smoke scenario to run.
        required: true
        default: all
        type: choice
        options:
          - all
          - cms_admin
          - cms_assets
          - checkout_shell
          - public_routes
      timeout_ms:
        description: Per-route timeout in milliseconds.
        required: true
        default: '60000'
        type: string
      evidence_dir:
        description: Root directory for smoke artifacts.
        required: true
        default: .codex-artifacts/smoke/uat/uat-static
        type: string
      screenshots:
        description: Screenshot policy.
        required: true
        default: on-failure
        type: choice
        options:
          - on-failure
          - always
          - never
      headed:
        description: Run Chromium headed.
        required: true
        default: false
        type: boolean
  workflow_run:
    workflows: ['Deploy UAT and PRD static sites']
    branches: ['main']
    types: [completed]

permissions:
  contents: read

concurrency:
  group: 'uat-static-smoke-${{ github.event.workflow_run.head_branch || github.ref }}'
  cancel-in-progress: true

jobs:
  smoke:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      UAT_STATIC_EVIDENCE_DIR: ${{ inputs.evidence_dir || '.codex-artifacts/smoke/uat/uat-static' }}
      UAT_STATIC_SCREENSHOTS: ${{ inputs.screenshots || 'on-failure' }}
      UAT_STATIC_SITE_URL: ${{ inputs.site_url || 'https://blackbox-studio-athens.github.io/blackbox-records' }}
      UAT_STATIC_SMOKE_SCENARIO: ${{ inputs.scenario || 'all' }}
      UAT_STATIC_TIMEOUT_MS: ${{ inputs.timeout_ms || '60000' }}
    steps:
      - name: Checkout deployed commit
        uses: actions/checkout@v5.0.1
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.33.4

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run UAT static smoke
        run: |
          args=(
            --site-url "${UAT_STATIC_SITE_URL}"
            --scenario "${UAT_STATIC_SMOKE_SCENARIO}"
            --timeout-ms "${UAT_STATIC_TIMEOUT_MS}"
            --evidence-dir "${UAT_STATIC_EVIDENCE_DIR}"
            --screenshots "${UAT_STATIC_SCREENSHOTS}"
          )

          if [ "${{ inputs.headed || false }}" = "true" ]; then
            args+=(--headed)
          fi

          pnpm smoke:uat-static -- "${args[@]}"

      - name: Upload UAT static smoke evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v5.0.0
        with:
          name: uat-static-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .codex-artifacts/smoke/uat/uat-static/**
            ${{ inputs.evidence_dir || '.codex-artifacts/smoke/uat/uat-static' }}/**
          if-no-files-found: warn
