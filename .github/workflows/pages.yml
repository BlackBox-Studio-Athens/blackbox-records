name: Deploy UAT static site to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.1

      - name: Configure GitHub Pages UAT
        uses: actions/configure-pages@v6.0.0

      - name: Build UAT site and Pages artifact
        uses: withastro/action@v6.1.1
        env:
          DECAP_SITE_URL: ${{ vars.DECAP_SITE_URL }}
          DECAP_REPOSITORY: ${{ vars.DECAP_REPOSITORY }}
          DECAP_BRANCH: ${{ vars.DECAP_BRANCH }}
          DECAPBRIDGE_BASE_URL: ${{ vars.DECAPBRIDGE_BASE_URL }}
          DECAPBRIDGE_AUTH_ENDPOINT: ${{ secrets.DECAPBRIDGE_AUTH_ENDPOINT }}
          DECAPBRIDGE_AUTH_TOKEN_ENDPOINT: ${{ secrets.DECAPBRIDGE_AUTH_TOKEN_ENDPOINT }}
          DECAPBRIDGE_GATEWAY_URL: ${{ vars.DECAPBRIDGE_GATEWAY_URL }}
        with:
          path: ./apps/web
          node-version: 24
          package-manager: pnpm@10.33.4
          cache: true
          build-cmd: >-
            pnpm --workspace-root test:unit &&
            pnpm --workspace-root check &&
            pnpm --workspace-root audit:unused &&
            ASTRO_SITE_URL="https://blackbox-studio-athens.github.io" ASTRO_BASE_PATH="/blackbox-records/" PUBLIC_BACKEND_BASE_URL="${{ vars.UAT_PUBLIC_BACKEND_BASE_URL }}" pnpm --workspace-root build:web

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy UAT to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
