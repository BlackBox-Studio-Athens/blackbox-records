name: Deploy UAT and PRD static sites

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: 'static-sites-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.33.4

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:unit

  workspace-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.33.4

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run workspace checks
        run: pnpm check

      - name: Run unused code audit
        run: pnpm audit:unused

  build-uat-static:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DECAP_SITE_URL: ${{ vars.DECAP_SITE_URL }}
      DECAP_REPOSITORY: ${{ vars.DECAP_REPOSITORY }}
      DECAP_BRANCH: ${{ vars.DECAP_BRANCH }}
      DECAPBRIDGE_BASE_URL: ${{ vars.DECAPBRIDGE_BASE_URL }}
      DECAPBRIDGE_AUTH_ENDPOINT: ${{ secrets.DECAPBRIDGE_AUTH_ENDPOINT }}
      DECAPBRIDGE_AUTH_TOKEN_ENDPOINT: ${{ secrets.DECAPBRIDGE_AUTH_TOKEN_ENDPOINT }}
      DECAPBRIDGE_GATEWAY_URL: ${{ vars.DECAPBRIDGE_GATEWAY_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.1

      - name: Configure GitHub Pages UAT
        uses: actions/configure-pages@v6.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.33.4

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build UAT static frontend
        env:
          ASTRO_SITE_URL: https://blackbox-studio-athens.github.io
          ASTRO_BASE_PATH: /blackbox-records/
          PUBLIC_BACKEND_BASE_URL: ${{ vars.UAT_PUBLIC_BACKEND_BASE_URL }}
        run: pnpm build:web

      - name: Upload UAT Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: apps/web/dist
          retention-days: 1

  build-prd-static:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DECAP_SITE_URL: ${{ vars.DECAP_SITE_URL }}
      DECAP_REPOSITORY: ${{ vars.DECAP_REPOSITORY }}
      DECAP_BRANCH: ${{ vars.DECAP_BRANCH }}
      DECAPBRIDGE_BASE_URL: ${{ vars.DECAPBRIDGE_BASE_URL }}
      DECAPBRIDGE_AUTH_ENDPOINT: ${{ secrets.DECAPBRIDGE_AUTH_ENDPOINT }}
      DECAPBRIDGE_AUTH_TOKEN_ENDPOINT: ${{ secrets.DECAPBRIDGE_AUTH_TOKEN_ENDPOINT }}
      DECAPBRIDGE_GATEWAY_URL: ${{ vars.DECAPBRIDGE_GATEWAY_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.33.4

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build disabled PRD static frontend
        env:
          ASTRO_SITE_URL: https://blackbox-records-web.pages.dev
          ASTRO_BASE_PATH: /
          PUBLIC_BACKEND_BASE_URL: ${{ vars.PRD_PUBLIC_BACKEND_BASE_URL }}
        run: pnpm build

      - name: Upload PRD static artifact
        uses: actions/upload-artifact@v5.0.0
        with:
          name: prd-static-site-${{ github.sha }}
          path: apps/web/dist
          if-no-files-found: error
          retention-days: 1

  deploy-uat:
    needs:
      - unit-tests
      - workspace-checks
      - build-uat-static
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy UAT to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0

  deploy-prd:
    needs:
      - unit-tests
      - workspace-checks
      - build-prd-static
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Download PRD static artifact
        uses: actions/download-artifact@v5.0.0
        with:
          name: prd-static-site-${{ github.sha }}
          path: apps/web/dist

      - name: Deploy disabled PRD static frontend to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=blackbox-records-web --branch=main
          packageManager: npm
          wranglerVersion: 4.94.0
