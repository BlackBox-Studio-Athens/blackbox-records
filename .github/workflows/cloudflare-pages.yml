name: Deploy PRD static site to Cloudflare Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: 'cloudflare-pages-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  deploy-cloudflare-pages:
    runs-on: ubuntu-latest
    env:
      DECAP_SITE_URL: ${{ vars.DECAP_SITE_URL }}
      DECAP_REPOSITORY: ${{ vars.DECAP_REPOSITORY }}
      DECAP_BRANCH: ${{ vars.DECAP_BRANCH }}
      DECAPBRIDGE_BASE_URL: ${{ vars.DECAPBRIDGE_BASE_URL }}
      DECAPBRIDGE_AUTH_ENDPOINT: ${{ secrets.DECAPBRIDGE_AUTH_ENDPOINT }}
      DECAPBRIDGE_AUTH_TOKEN_ENDPOINT: ${{ secrets.DECAPBRIDGE_AUTH_TOKEN_ENDPOINT }}
      DECAPBRIDGE_GATEWAY_URL: ${{ vars.DECAPBRIDGE_GATEWAY_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.34.3

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run workspace checks
        run: pnpm check

      - name: Run unused code audit
        run: pnpm audit:unused

      - name: Build disabled PRD static frontend
        env:
          ASTRO_SITE_URL: https://blackbox-records-web.pages.dev
          ASTRO_BASE_PATH: /
          PUBLIC_BACKEND_BASE_URL: ${{ vars.PRD_PUBLIC_BACKEND_BASE_URL }}
        run: pnpm build

      - name: Deploy disabled PRD static frontend to Cloudflare Pages
        working-directory: apps/backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler pages deploy ../../apps/web/dist --project-name=blackbox-records-web --branch=main
