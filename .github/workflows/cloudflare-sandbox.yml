name: Deploy Worker sandbox

on:
  push:
    branches: ['sandbox']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: 'cloudflare-sandbox'
  cancel-in-progress: true

jobs:
  deploy-backend-sandbox:
    runs-on: ubuntu-latest
    environment: catalog-promotion-uat
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.33.4

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate API contracts
        run: pnpm generate:api

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run workspace checks
        run: pnpm check

      - name: Run unused code audit
        run: pnpm audit:unused

      - name: Verify Stripe payment method policy
        env:
          STRIPE_PAYMENT_METHOD_CONFIGURATION_ID: ${{ vars.STRIPE_PAYMENT_METHOD_CONFIGURATION_ID }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: pnpm stripe:payment-methods:verify

      - name: Deploy Worker sandbox
        run: pnpm deploy:backend:sandbox
