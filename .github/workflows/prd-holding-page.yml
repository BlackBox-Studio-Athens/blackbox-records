name: Build or deploy PRD Holding Page

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy verified artifact to the protected holding branch
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: prd-holding-page
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.33.4

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run workspace checks
        run: pnpm check

      - name: Run unused code audit
        run: pnpm audit:unused

      - name: Build PRD-shaped static frontend
        run: pnpm build
        env:
          ASTRO_SITE_URL: https://blackbox-records-web.pages.dev
          ASTRO_BASE_PATH: /
          DECAP_BACKEND_MODE: disabled
          PUBLIC_BACKEND_BASE_URL: ${{ vars.PRD_PUBLIC_BACKEND_BASE_URL }}

      - name: Prepare and check PRD Holding Page artifact
        run: pnpm prd:holding:prepare && pnpm prd:holding:check

      - name: Upload PRD Holding Page artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: prd-holding-page-${{ github.sha }}
          path: apps/web/dist-holding
          if-no-files-found: error
          retention-days: 1

  deploy:
    if: ${{ inputs.deploy == true }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write
    environment:
      name: prd-holding
    steps:
      - name: Download PRD Holding Page artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: prd-holding-page-${{ github.sha }}
          path: apps/web/dist-holding

      - name: Deploy PRD Holding Page branch
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist-holding --project-name=blackbox-records-web --branch=holding
          packageManager: npm
          wranglerVersion: 4.94.0
